<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>État Mental — Semaine Trading</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root {
  --bg:#191919;
  --bg2:#1f1f1f;
  --bg3:#242424;
  --bg4:#2a2a2a;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);
  --gold:#c9a84c;
  --gold-dim:rgba(201,168,76,0.12);
  --text:#e8e6e0;
  --text-dim:#5a584f;
  --text-mid:#9b9890;
  --red:#d94f4f;
  --orange:#d97c2a;
  --green:#4caf7d;
  --red-bg:rgba(217,79,79,0.1);
  --orange-bg:rgba(217,124,42,0.1);
  --green-bg:rgba(76,175,125,0.1);
  --red-border:rgba(217,79,79,0.3);
  --orange-border:rgba(217,124,42,0.3);
  --green-border:rgba(76,175,125,0.3);
  --font:'Space Grotesk',sans-serif;
  --mono:'Space Mono',monospace;
}

body {
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  min-height:100vh;
  padding:28px 16px 60px;
}

.page { max-width:900px; margin:0 auto; }

/* Header */
.header {
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  margin-bottom:24px;
}
.eyebrow {
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:5px;
}
.title { font-size:20px; font-weight:600; letter-spacing:-0.02em; }
.week-nav {
  display:flex;
  align-items:center;
  gap:10px;
}
.nav-btn {
  background:var(--bg2);
  border:1px solid var(--border);
  color:var(--text-mid);
  width:28px; height:28px;
  border-radius:6px;
  font-size:13px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s;
}
.nav-btn:hover { border-color:var(--border2); color:var(--text); }
.week-label {
  font-family:var(--mono);
  font-size:10px;
  color:var(--text-mid);
  letter-spacing:0.08em;
  min-width:100px;
  text-align:center;
}

/* Week grid */
.week-grid {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-bottom:24px;
}

.day-col {
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:border-color 0.2s, transform 0.15s;
}
.day-col:hover { border-color:var(--border2); transform:translateY(-1px); }
.day-col.active { border-color:var(--gold); }
.day-col.today .day-header { background:var(--gold-dim); }

.day-header {
  padding:10px 10px 8px;
  border-bottom:1px solid var(--border);
  text-align:center;
}
.day-name {
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--text-mid);
  margin-bottom:2px;
}
.day-date {
  font-family:var(--mono);
  font-size:11px;
  color:var(--text-dim);
}
.day-col.today .day-name { color:var(--gold); }
.day-col.today .day-date { color:var(--gold); opacity:0.6; }

.day-body { padding:8px; }

/* Score bars in grid */
.mini-bars { display:flex; flex-direction:column; gap:4px; margin-bottom:8px; }
.mini-bar-row { display:flex; align-items:center; gap:5px; }
.mini-bar-label {
  font-family:var(--mono);
  font-size:8px;
  color:var(--text-dim);
  width:18px;
  text-transform:uppercase;
  letter-spacing:0.05em;
  flex-shrink:0;
}
.mini-bar-track {
  flex:1;
  height:4px;
  background:rgba(255,255,255,0.05);
  border-radius:2px;
  overflow:hidden;
}
.mini-bar-fill {
  height:100%;
  border-radius:2px;
  transition:width 0.3s ease, background 0.3s ease;
}
.mini-val {
  font-family:var(--mono);
  font-size:8px;
  width:10px;
  text-align:right;
  flex-shrink:0;
}

/* Day verdict badge */
.day-verdict {
  text-align:center;
  padding:5px 4px;
  border-radius:5px;
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:0.05em;
  font-weight:700;
  transition:all 0.3s;
}
.day-verdict.empty {
  color:var(--text-dim);
  background:rgba(255,255,255,0.03);
  font-weight:400;
  font-size:8px;
  letter-spacing:0.08em;
}
.day-verdict.green { background:var(--green-bg); color:var(--green); border:1px solid var(--green-border); }
.day-verdict.orange { background:var(--orange-bg); color:var(--orange); border:1px solid var(--orange-border); }
.day-verdict.red { background:var(--red-bg); color:var(--red); border:1px solid var(--red-border); }

.day-avg {
  text-align:center;
  font-family:var(--mono);
  font-size:16px;
  font-weight:700;
  margin-bottom:6px;
  transition:color 0.3s;
}
.day-avg.empty { color:var(--text-dim); font-size:18px; }
.day-avg.green { color:var(--green); }
.day-avg.orange { color:var(--orange); }
.day-avg.red { color:var(--red); }

/* Sliders panel */
.panel-wrap {
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  margin-bottom:24px;
  transition:all 0.3s ease;
}
.panel-wrap.hidden { display:none; }

.panel-header {
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.panel-day-name {
  font-size:14px;
  font-weight:600;
  color:var(--text);
}
.panel-day-name span {
  font-family:var(--mono);
  font-size:10px;
  color:var(--gold);
  margin-left:10px;
  letter-spacing:0.1em;
}

.panel-close {
  background:none;
  border:none;
  color:var(--text-dim);
  font-size:18px;
  cursor:pointer;
  line-height:1;
  padding:2px 4px;
  transition:color 0.2s;
}
.panel-close:hover { color:var(--text); }

.panel-body { padding:16px 18px; }

.sliders { display:flex; flex-direction:column; gap:14px; margin-bottom:18px; }

.slider-row {}
.slider-top {
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  margin-bottom:8px;
}
.slider-name { font-size:13px; font-weight:500; }
.slider-val {
  font-family:var(--mono);
  font-size:14px;
  font-weight:700;
  transition:color 0.3s;
  min-width:20px;
  text-align:right;
}
.slider-track-wrap {
  position:relative;
  height:6px;
  border-radius:4px;
  background:rgba(255,255,255,0.06);
}
.slider-fill {
  height:100%;
  border-radius:4px;
  transition:width 0.1s, background 0.3s;
  pointer-events:none;
}
input[type="range"] {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  opacity:0;
  cursor:pointer;
  margin:0;
}
.slider-hint {
  display:flex;
  justify-content:space-between;
  margin-top:4px;
  font-family:var(--mono);
  font-size:9px;
  color:var(--text-dim);
  letter-spacing:0.04em;
}

.stress-badge {
  font-family:var(--mono);
  font-size:8px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--text-dim);
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  border-radius:3px;
  padding:1px 5px;
  margin-left:6px;
}

/* Panel verdict */
.panel-verdict {
  border-radius:8px;
  padding:12px 14px;
  margin-bottom:14px;
  border:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:all 0.3s;
}
.panel-verdict.green { background:var(--green-bg); border-color:var(--green-border); }
.panel-verdict.orange { background:var(--orange-bg); border-color:var(--orange-border); }
.panel-verdict.red { background:var(--red-bg); border-color:var(--red-border); }

.pv-text { font-size:13px; font-weight:500; }
.pv-text.green { color:var(--green); }
.pv-text.orange { color:var(--orange); }
.pv-text.red { color:var(--red); }

.pv-score {
  font-family:var(--mono);
  font-size:22px;
  font-weight:700;
}
.pv-score.green { color:var(--green); }
.pv-score.orange { color:var(--orange); }
.pv-score.red { color:var(--red); }

.btn-save {
  width:100%;
  padding:12px;
  background:var(--gold);
  color:#0d0d0f;
  border:none;
  border-radius:8px;
  font-family:var(--font);
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  letter-spacing:0.02em;
  transition:background 0.2s;
}
.btn-save:hover { background:#d4b05c; }

/* Toast */
.toast {
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--bg3);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:9px 18px;
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:0.06em;
  color:var(--gold);
  transition:transform 0.3s ease;
  white-space:nowrap;
  z-index:100;
}
.toast.show { transform:translateX(-50%) translateY(0); }

/* Reset week btn */
.week-actions {
  display:flex;
  justify-content:flex-end;
  margin-bottom:10px;
}
.btn-reset-week {
  font-family:var(--mono);
  font-size:10px;
  color:var(--text-dim);
  background:none;
  border:none;
  cursor:pointer;
  letter-spacing:0.06em;
  padding:2px 0;
  transition:color 0.2s;
}
.btn-reset-week:hover { color:var(--red); }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div>
      <div class="eyebrow">Trading — check-in mental</div>
      <div class="title">Vue semaine</div>
    </div>
    <div class="week-nav">
      <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
      <div class="week-label" id="weekLabel"></div>
      <button class="nav-btn" onclick="changeWeek(1)">›</button>
    </div>
  </div>

  <div class="week-grid" id="weekGrid"></div>

  <!-- Sliders panel -->
  <div class="panel-wrap hidden" id="panel">
    <div class="panel-header">
      <div class="panel-day-name" id="panelDayName">Lundi <span id="panelDayEyebrow"></span></div>
      <button class="panel-close" onclick="closePanel()">×</button>
    </div>
    <div class="panel-body">
      <div class="sliders">

        <div class="slider-row">
          <div class="slider-top">
            <span class="slider-name">⚡ Énergie</span>
            <span class="slider-val" id="val-energie">5</span>
          </div>
          <div class="slider-track-wrap">
            <div class="slider-fill" id="fill-energie"></div>
            <input type="range" min="0" max="10" value="5" id="sl-energie" oninput="updateSlider('energie')">
          </div>
          <div class="slider-hint"><span>épuisé</span><span>peak</span></div>
        </div>

        <div class="slider-row">
          <div class="slider-top">
            <span class="slider-name">🎯 Concentration</span>
            <span class="slider-val" id="val-concentration">5</span>
          </div>
          <div class="slider-track-wrap">
            <div class="slider-fill" id="fill-concentration"></div>
            <input type="range" min="0" max="10" value="5" id="sl-concentration" oninput="updateSlider('concentration')">
          </div>
          <div class="slider-hint"><span>éparpillé</span><span>tunnel</span></div>
        </div>

        <div class="slider-row">
          <div class="slider-top">
            <span class="slider-name">🧠 Confiance</span>
            <span class="slider-val" id="val-confiance">5</span>
          </div>
          <div class="slider-track-wrap">
            <div class="slider-fill" id="fill-confiance"></div>
            <input type="range" min="0" max="10" value="5" id="sl-confiance" oninput="updateSlider('confiance')">
          </div>
          <div class="slider-hint"><span>doute total</span><span>conviction</span></div>
        </div>

        <div class="slider-row">
          <div class="slider-top">
            <span class="slider-name">😤 Stress <span class="stress-badge">inversé</span></span>
            <span class="slider-val" id="val-stress">5</span>
          </div>
          <div class="slider-track-wrap">
            <div class="slider-fill" id="fill-stress"></div>
            <input type="range" min="0" max="10" value="5" id="sl-stress" oninput="updateSlider('stress')">
          </div>
          <div class="slider-hint"><span>zen total</span><span>hors contrôle</span></div>
        </div>

        <div class="slider-row">
          <div class="slider-top">
            <span class="slider-name">⏳ Patience</span>
            <span class="slider-val" id="val-patience">5</span>
          </div>
          <div class="slider-track-wrap">
            <div class="slider-fill" id="fill-patience"></div>
            <input type="range" min="0" max="10" value="5" id="sl-patience" oninput="updateSlider('patience')">
          </div>
          <div class="slider-hint"><span>impulsif</span><span>glacial</span></div>
        </div>

      </div>

      <div class="panel-verdict" id="panelVerdict">
        <div class="pv-text" id="pvText">—</div>
        <div class="pv-score" id="pvScore">—</div>
      </div>

      <button class="btn-save" onclick="saveDay()">Valider la session</button>
    </div>
  </div>

  <div class="week-actions">
    <button class="btn-reset-week" onclick="resetWeek()">Effacer la semaine</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const METRICS = ['energie','concentration','confiance','stress','patience'];
const METRIC_SHORT = { energie:'En', concentration:'Co', confiance:'Cf', stress:'St', patience:'Pa' };
const DAYS = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi'];

let currentWeekOffset = 0;
let activeDay = null;

function getMonday(offset) {
  const now = new Date();
  const day = now.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const monday = new Date(now);
  monday.setDate(now.getDate() + diff + offset * 7);
  monday.setHours(0,0,0,0);
  return monday;
}

function getWeekKey(offset) {
  const m = getMonday(offset);
  return m.toISOString().slice(0,10);
}

function getDayKey(offset, dayIndex) {
  const m = getMonday(offset);
  m.setDate(m.getDate() + dayIndex);
  return m.toISOString().slice(0,10);
}

function getTodayKey() {
  const now = new Date();
  now.setHours(0,0,0,0);
  return now.toISOString().slice(0,10);
}

function loadData(weekKey) {
  return JSON.parse(localStorage.getItem('tw-' + weekKey) || '{}');
}

function saveData(weekKey, data) {
  localStorage.setItem('tw-' + weekKey, JSON.stringify(data));
}

function getColor(score) {
  if (score >= 7) return '#4caf7d';
  if (score >= 4.5) return '#d97c2a';
  return '#d94f4f';
}

function getClass(score) {
  if (score >= 7) return 'green';
  if (score >= 4.5) return 'orange';
  return 'red';
}

function getVerdictText(score) {
  if (score >= 7) return 'Conditions optimales';
  if (score >= 4.5) return 'Vigilance — taille réduite';
  return 'Ne pas trader';
}

function getNorm(metric, raw) {
  return metric === 'stress' ? 10 - raw : raw;
}

function computeAvg(scores) {
  const total = METRICS.reduce((s, m) => s + getNorm(m, scores[m] ?? 5), 0);
  return Math.round((total / METRICS.length) * 10) / 10;
}

function changeWeek(dir) {
  currentWeekOffset += dir;
  closePanel();
  renderWeek();
}

function renderWeek() {
  const weekKey = getWeekKey(currentWeekOffset);
  const data = loadData(weekKey);
  const monday = getMonday(currentWeekOffset);
  const todayKey = getTodayKey();

  // Week label
  const endFriday = new Date(monday);
  endFriday.setDate(monday.getDate() + 4);
  const opts = { day:'numeric', month:'short' };
  document.getElementById('weekLabel').textContent =
    monday.toLocaleDateString('fr-FR', opts) + ' – ' + endFriday.toLocaleDateString('fr-FR', opts);

  const grid = document.getElementById('weekGrid');
  grid.innerHTML = '';

  for (let i = 0; i < 5; i++) {
    const dayDate = new Date(monday);
    dayDate.setDate(monday.getDate() + i);
    const dayKey = dayDate.toISOString().slice(0,10);
    const isToday = dayKey === todayKey;
    const dayData = data[dayKey];

    const col = document.createElement('div');
    col.className = 'day-col' + (isToday ? ' today' : '') + (activeDay === dayKey ? ' active' : '');
    col.onclick = () => openPanel(i, dayKey, dayDate);

    const dayNum = dayDate.toLocaleDateString('fr-FR', { day:'numeric' });

    let bodyHTML = '';
    if (dayData) {
      const avg = computeAvg(dayData);
      const cls = getClass(avg);
      const color = getColor(avg);

      const bars = METRICS.map(m => {
        const raw = dayData[m] ?? 5;
        const norm = getNorm(m, raw);
        const c = getColor(norm);
        const pct = (raw / 10) * 100;
        return `<div class="mini-bar-row">
          <span class="mini-bar-label">${METRIC_SHORT[m]}</span>
          <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${pct}%;background:${c}"></div></div>
          <span class="mini-val" style="color:${c}">${raw}</span>
        </div>`;
      }).join('');

      const verdictLabel = avg >= 7 ? '▲ OK' : avg >= 4.5 ? '~ Vigilance' : '✕ Stop';

      bodyHTML = `
        <div class="day-avg ${cls}">${avg.toFixed(1)}</div>
        <div class="mini-bars">${bars}</div>
        <div class="day-verdict ${cls}">${verdictLabel}</div>
      `;
    } else {
      bodyHTML = `
        <div class="day-avg empty">—</div>
        <div class="mini-bars">${METRICS.map(m => `
          <div class="mini-bar-row">
            <span class="mini-bar-label">${METRIC_SHORT[m]}</span>
            <div class="mini-bar-track"><div class="mini-bar-fill" style="width:0%"></div></div>
            <span class="mini-val" style="color:var(--text-dim)">—</span>
          </div>`).join('')}
        </div>
        <div class="day-verdict empty">+ ajouter</div>
      `;
    }

    col.innerHTML = `
      <div class="day-header">
        <div class="day-name">${DAYS[i]}</div>
        <div class="day-date">${dayNum}</div>
      </div>
      <div class="day-body">${bodyHTML}</div>
    `;

    grid.appendChild(col);
  }
}

function openPanel(dayIndex, dayKey, dayDate) {
  activeDay = dayKey;
  const weekKey = getWeekKey(currentWeekOffset);
  const data = loadData(weekKey);
  const dayData = data[dayKey] || {};

  // Set panel header
  const dateStr = dayDate.toLocaleDateString('fr-FR', { day:'numeric', month:'long' });
  document.getElementById('panelDayName').innerHTML = DAYS[dayIndex] + ' <span>' + dateStr + '</span>';

  // Load existing scores or defaults
  METRICS.forEach(m => {
    const val = dayData[m] !== undefined ? dayData[m] : 5;
    document.getElementById('sl-' + m).value = val;
    updateSlider(m);
  });

  document.getElementById('panel').classList.remove('hidden');
  document.getElementById('panel').scrollIntoView({ behavior:'smooth', block:'nearest' });

  renderWeek();
}

function closePanel() {
  activeDay = null;
  document.getElementById('panel').classList.add('hidden');
  renderWeek();
}

function updateSlider(metric) {
  const raw = parseInt(document.getElementById('sl-' + metric).value);
  const norm = getNorm(metric, raw);
  const color = getColor(norm);

  document.getElementById('val-' + metric).textContent = raw;
  document.getElementById('val-' + metric).style.color = color;

  const pct = (raw / 10) * 100;
  const fill = document.getElementById('fill-' + metric);
  fill.style.width = pct + '%';
  fill.style.background = color;

  updatePanelVerdict();
}

function updatePanelVerdict() {
  const scores = {};
  METRICS.forEach(m => { scores[m] = parseInt(document.getElementById('sl-' + m).value); });
  const avg = computeAvg(scores);
  const cls = getClass(avg);

  const verdict = document.getElementById('panelVerdict');
  verdict.className = 'panel-verdict ' + cls;
  document.getElementById('pvText').className = 'pv-text ' + cls;
  document.getElementById('pvText').textContent = getVerdictText(avg);
  document.getElementById('pvScore').className = 'pv-score ' + cls;
  document.getElementById('pvScore').textContent = avg.toFixed(1);
}

function saveDay() {
  if (!activeDay) return;
  const weekKey = getWeekKey(currentWeekOffset);
  const data = loadData(weekKey);
  const scores = {};
  METRICS.forEach(m => { scores[m] = parseInt(document.getElementById('sl-' + m).value); });
  data[activeDay] = scores;
  saveData(weekKey, data);

  const avg = computeAvg(scores);
  showToast('Session validée — ' + avg.toFixed(1) + '/10');
  closePanel();
}

function resetWeek() {
  const weekKey = getWeekKey(currentWeekOffset);
  localStorage.removeItem('tw-' + weekKey);
  closePanel();
  renderWeek();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
renderWeek();
</script>
</body>
</html>
